name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: swift test

      - name: Build universal binary
        run: |
          swift build -c release --arch arm64 --arch x86_64
          mkdir -p dist
          cp .build/apple/Products/Release/needyghostty dist/needyghostty
          cd dist && tar czf needyghostty-macos-universal.tar.gz needyghostty
          shasum -a 256 needyghostty-macos-universal.tar.gz > needyghostty-macos-universal.tar.gz.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/needyghostty-macos-universal.tar.gz
            dist/needyghostty-macos-universal.tar.gz.sha256
